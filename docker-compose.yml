# 本地开发依赖：PostgreSQL + Redis + MinIO
# 用法：docker-compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: flower-postgres
    environment:
      POSTGRES_USER: flower
      POSTGRES_PASSWORD: flower
      POSTGRES_DB: flower
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flower-redis
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: flower-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # 控制台
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
