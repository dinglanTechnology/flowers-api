# 本地开发依赖 + 单机整体部署：PostgreSQL + Redis + MinIO + app
# 只起依赖（本地开发，app 在宿主机跑）：docker compose up -d postgres redis minio
# 整体部署（含 app 镜像）：           docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: flower-postgres
    environment:
      POSTGRES_USER: flower
      POSTGRES_PASSWORD: flower
      POSTGRES_DB: flower
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flower -d flower']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flower-redis
    # 开启 AOF 持久化：容器重启后 refresh token / 缓存不丢
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: flower-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # 控制台
    volumes:
      - miniodata:/data

  # 一次性：把 Prisma schema 同步到数据库后退出（app 启动前跑）。
  # 用 build 阶段镜像（含 prisma CLI；运行镜像里 prisma 已被 prune）。
  # 当前项目用 db push；若改用 migration 工作流，把命令换成：pnpm prisma migrate deploy
  migrate:
    build:
      context: .
      target: build
    env_file: .env
    environment:
      DATABASE_URL: postgresql://flower:flower@postgres:5432/flower?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "pnpm prisma db push"
    restart: 'no'

  app:
    build:
      context: .
    container_name: flower-api
    # JWT / 微信 / AI / 存储等密钥从 .env 读取
    env_file: .env
    environment:
      # 容器内 localhost 指向容器自身，连不到依赖 —— 用同网络的服务名，覆盖 .env 里的值
      DATABASE_URL: postgresql://flower:flower@postgres:5432/flower?schema=public
      REDIS_URL: redis://redis:6379
      # 注意：若 STORAGE_PROVIDER=minio，.env 里的 OSS_ENDPOINT 也要指向服务名 http://minio:9000
      #       （用真实阿里云 OSS 则无此问题，删掉本行说明即可）
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
