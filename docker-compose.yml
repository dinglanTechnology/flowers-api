# 服务器自建 Redis —— 供 flowers-api 使用（refresh token + AI 任务队列 BullMQ）
# 其余依赖均为外部服务，不在本文件：
#   - PostgreSQL：阿里云 RDS
#   - 对象存储：阿里云 OSS
#   - 应用：CI 构建镜像 + Jenkins 用 docker run 部署（同机、共用下方 flowers-net 网络）
#
# 部署（在服务器上，Redis 要先于 app 起来以创建网络）：
#   REDIS_PASSWORD=<强密码> docker compose up -d
#   （或把 REDIS_PASSWORD 写进同目录 .env）
#
# 之后 Jenkins 用同一网络跑 app（app 通过服务名 redis 连）：
#   docker run -d --name flowers-api --network flowers-net --env-file .env -p 3000:3000 <image>
#   其中 .env 里 REDIS_URL=redis://:<强密码>@redis:6379

services:
  redis:
    image: redis:7-alpine
    container_name: flower-redis
    restart: unless-stopped
    networks:
      - flowers
    # AOF 持久化（token/队列重启不丢）+ 必须密码 + 不淘汰键（避免任务/令牌被逐出）
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --requirepass
      - '${REDIS_PASSWORD:?REDIS_PASSWORD 必填}'
      - --maxmemory-policy
      - noeviction
    volumes:
      - redisdata:/data
    # 不对外暴露端口：仅同网络(flowers-net)内的 app 用服务名 redis 访问。
    # 如需在宿主机用 redis-cli 调试，取消下面两行（仅绑回环，安全）：
    # ports:
    #   - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  flowers:
    name: flowers-net

volumes:
  redisdata:
